<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schwimmen</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
        integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
    <link rel="stylesheet" href="../css/custom.css">
    <link rel="stylesheet" href="../css/game-board.css">
</head>
<body>
    <main class="game-root">
        <section class="game-table" aria-label="Spielfeld">
            <header class="table-header">
                <div>
                    <strong>Runde:</strong> <span id="roundValue">-</span>
                </div>
                <div>
                    <strong>Status:</strong> <span id="turnInfo">Warte auf Spielstatus ...</span>
                </div>
                <div>
                    <strong>Dein Score:</strong> <span id="myScoreValue">-</span>
                </div>
            </header>

            <div class="event-message" id="eventMessage">&nbsp;</div>

            <div class="player-zone top" id="opponentTop">
                <div class="player-label" id="opponentTopLabel">Gegner oben</div>
                <div class="card-row" id="opponentTopCards"></div>
            </div>

            <div class="player-zone left" id="opponentLeft">
                <div class="player-label" id="opponentLeftLabel">Gegner links</div>
                <div class="card-row vertical" id="opponentLeftCards"></div>
            </div>

            <div class="player-zone right" id="opponentRight">
                <div class="player-label" id="opponentRightLabel">Gegner rechts</div>
                <div class="card-row vertical" id="opponentRightCards"></div>
            </div>

            <div class="center-zone">
                <div class="deck-pile" id="deckPile">Deck</div>
                <div class="card-row table-cards" id="tableCardsContainer"></div>
            </div>

            <div class="action-bar">
                <button id="swapCardButton" class="btn btn-light btn-sm" type="button">Ausgewählte tauschen</button>
                <button id="swapAllButton" class="btn btn-outline-light btn-sm" type="button">Alle Karten tauschen</button>
                <button id="knockButton" class="btn btn-warning btn-sm" type="button">Klopfen</button>
                <button id="passButton" class="btn btn-secondary btn-sm" type="button">Passen</button>
            </div>

            <div class="player-zone bottom" id="ownPlayerZone">
                <div class="player-label" id="ownPlayerLabel">Deine Karten</div>
                <div class="card-row" id="ownCardsContainer"></div>
            </div>
        </section>

    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script type="module" src="game-client.js"></script>
</body>
</html>
