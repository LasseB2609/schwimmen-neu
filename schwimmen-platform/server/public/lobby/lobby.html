<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schwimmen Lobby</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
        integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
    <link rel="stylesheet" href="../css/lobby.css">
</head>
<body>
    <main class="lobby-shell">
        <h1 class="lobby-headline">Schwimmen Lobby</h1>
        <p class="text-center text-muted mb-3">Angemeldet als: <strong id="sessionUsername">...</strong></p>

        <div class="card lobby-card">
            <div class="card-body">
                <div class="form-row">
                    <div class="form-group col-md-8">
                        <label for="lobbyNameInput">Lobby Name</label>
                        <input id="lobbyNameInput" class="form-control" type="text" placeholder="z. B. Meine Lobby">
                    </div>
                    <div class="form-group col-md-4 d-flex align-items-end">
                        <button id="createLobbyButton" class="btn btn-primary btn-block" type="button">Lobby erstellen</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="card lobby-card">
            <div class="card-body">
                <div class="form-row">
                    <div class="form-group col-md-6">
                        <label for="joinLobbyIdInput">Lobby ID</label>
                        <input id="joinLobbyIdInput" class="form-control" type="number" placeholder="z. B. 1">
                    </div>
                    <div class="form-group col-md-6 d-flex align-items-end">
                        <button id="joinLobbyButton" class="btn btn-outline-primary btn-block" type="button">Lobby beitreten</button>
                    </div>
                </div>

                <h2 class="h5">Offene Lobbys</h2>
                <ul id="lobbyList" class="list-group"></ul>
            </div>
        </div>

        <div class="card lobby-card">
            <div class="card-body">
                <h2 class="h5">Aktuelle Lobby</h2>
                <pre id="currentLobbyOutput" class="mb-3">Noch keiner Lobby beigetreten.</pre>
                <div class="d-flex flex-wrap gap-2">
                    <button id="startGameButton" class="btn btn-success mr-2" type="button">Spiel starten (Host)</button>
                    <button id="leaveLobbyButton" class="btn btn-outline-danger" type="button">Lobby verlassen</button>
                </div>
            </div>
        </div>

        <div class="card lobby-card">
            <div class="card-body">
                <button id="logoutButton" class="btn btn-outline-danger" type="button">Logout</button>
            </div>
        </div>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script type="module" src="lobby-client.js"></script>
</body>
</html>
