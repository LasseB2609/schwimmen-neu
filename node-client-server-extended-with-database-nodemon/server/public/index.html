<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schwimmen Login</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
        integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
</head>
<body class="bg-light">
    <main class="container py-5">
        <h1 class="mb-2">Schwimmen</h1>
        <p class="text-muted mb-4">Bitte zuerst anmelden oder registrieren.</p>

        <div class="row">
            <section class="col-md-6 mb-4">
                <div class="card">
                    <div class="card-body">
                        <h2 class="h5">Anmelden</h2>
                        <div class="form-group">
                            <label for="loginUsername">Username</label>
                            <input id="loginUsername" class="form-control" type="text" placeholder="Nutzername">
                        </div>
                        <div class="form-group">
                            <label for="loginPassword">Passwort</label>
                            <input id="loginPassword" class="form-control" type="password" placeholder="mindestens 6 Zeichen">
                        </div>
                        <button id="loginButton" class="btn btn-primary" type="button">Login</button>
                    </div>
                </div>
            </section>

            <section class="col-md-6 mb-4">
                <div class="card">
                    <div class="card-body">
                        <h2 class="h5">Registrieren</h2>
                        <div class="form-group">
                            <label for="registerUsername">Username</label>
                            <input id="registerUsername" class="form-control" type="text" placeholder="Nutzername">
                        </div>
                        <div class="form-group">
                            <label for="registerPassword">Passwort</label>
                            <input id="registerPassword" class="form-control" type="password" placeholder="mindestens 6 Zeichen">
                        </div>
                        <button id="registerButton" class="btn btn-success" type="button">Registrieren</button>
                    </div>
                </div>
            </section>
        </div>

        <section class="card">
            <div class="card-body">
                <h2 class="h6">Status</h2>
                <pre id="authStatus" class="mb-0">Nicht angemeldet.</pre>
            </div>
        </section>
    </main>

    <script src="auth-client.js"></script>
</body>
</html>
